<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#020617;

            color:white;

            font-family:Arial;

            padding:40px;
        }

        h1{

            margin-bottom:30px;

            color:#38bdf8;
        }

        .section{

            background:#0f172a;

            padding:25px;

            border-radius:15px;

            margin-bottom:30px;
        }

        table{

            width:100%;

            border-collapse:collapse;

            margin-top:20px;
        }

        table th{

            background:#1e293b;

            padding:15px;
        }

        table td{

            padding:15px;

            border-bottom:1px solid #334155;
        }

    </style>

</head>

<body>

<h1>🚀 Admin Dashboard</h1>

<div class="section">

    <h2>Users</h2>

    <table>

        <tr>

            <th>ID</th>

            <th>Username</th>

            <th>Password</th>

        </tr>

        {% for user in users %}

        <tr>

            <td>{{ user[0] }}</td>

            <td>{{ user[1] }}</td>

            <td>{{ user[2] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

<div class="section">

    <h2>Comment History</h2>

    <table>

        <tr>

            <th>ID</th>

            <th>Comment</th>

            <th>Result</th>

            <th>Score</th>

            <th>Emotion</th>

        </tr>

        {% for item in history %}

        <tr>

            <td>{{ item[0] }}</td>

            <td>{{ item[1] }}</td>

            <td>{{ item[2] }}</td>

            <td>{{ item[3] }}%</td>

            <td>{{ item[4] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>

</html>
