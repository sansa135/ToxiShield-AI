<!DOCTYPE html>
<html>

<head>

    <title>Signup - ToxiShield AI</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#020617;

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;

            font-family:Arial;

            color:white;
        }

        .container{

            width:400px;

            background:#0f172a;

            padding:40px;

            border-radius:20px;

            box-shadow:0px 0px 30px rgba(0,0,0,0.7);
        }

        h1{

            text-align:center;

            margin-bottom:30px;

            color:#38bdf8;
        }

        input{

            width:100%;

            padding:15px;

            margin-top:15px;

            border:none;

            border-radius:10px;

            background:#1e293b;

            color:white;

            font-size:16px;
        }

        button{

            width:100%;

            padding:15px;

            margin-top:25px;

            border:none;

            border-radius:10px;

            background:#22c55e;

            color:white;

            font-size:18px;

            cursor:pointer;
        }

        button:hover{

            background:#16a34a;
        }

        a{

            color:#38bdf8;

            text-decoration:none;
        }

        .bottom{

            margin-top:20px;

            text-align:center;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🚀 Signup</h1>

    <form method="POST">

        <input
                type="text"
                name="username"
                placeholder="Create Username"
                required
        >

        <input
                type="password"
                name="password"
                placeholder="Create Password"
                required
        >

        <button type="submit">

            Signup

        </button>

    </form>

    <div class="bottom">

        Already have an account?

        <a href="/login">

            Login

        </a>

    </div>

</div>

</body>

</html>
